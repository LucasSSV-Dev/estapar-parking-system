server:
  port: 3003

garage:
  api:
    url: http://localhost:3000/garage

spring:
  application:
    name: EstaparParkingSystem

  datasource:
    url: jdbc:mysql://localhost:3306/estaparparkingsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true