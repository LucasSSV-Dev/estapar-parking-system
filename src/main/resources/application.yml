server:
  port: 8080

spring:
  application:
    name: EstaparParkingSystem

  datasource:
    url: jdbc:postgresql://localhost:5432/estaparparkingsystem
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true


